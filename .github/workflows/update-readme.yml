name: Update README Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats and update README
        env:
          GH_TOKEN_DEFAULT: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN_PAT: ${{ secrets.GH_PAT }}
        run: |
          # --- Stars ---
          STARS_TOTAL=$(GH_TOKEN="$GH_TOKEN_DEFAULT" gh api users/ktmage/repos --paginate --jq '[.[].stargazers_count] | add // 0')

          STARS_LINES=$(GH_TOKEN="$GH_TOKEN_DEFAULT" gh api users/ktmage/repos --paginate --jq '
            [.[] | select(.stargazers_count > 0)] | sort_by(-.stargazers_count) |
            to_entries | map(
              (if .key == (length - 1) then "в””в”Җ " else "в”ңв”Җ " end) +
              .value.name + "  " + (.value.stargazers_count | tostring)
            ) | .[]
          ')
          STARS_LINES=$(echo "$STARS_LINES" | head -5)
          STARS_LINES=$(echo "$STARS_LINES" | sed '$ s/в”ңв”Җ/в””в”Җ/')

          # --- All-time contributions ---
          CREATED_YEAR=$(GH_TOKEN="$GH_TOKEN_DEFAULT" gh api users/ktmage --jq '.created_at[:4]')
          CURRENT_YEAR=$(date -u +%Y)
          TOTAL_CONTRIBUTIONS=0

          for YEAR in $(seq "$CREATED_YEAR" "$CURRENT_YEAR"); do
            FROM="${YEAR}-01-01T00:00:00Z"
            TO="${YEAR}-12-31T23:59:59Z"
            COUNT=$(GH_TOKEN="$GH_TOKEN_DEFAULT" gh api graphql \
              -f query="query { user(login: \"ktmage\") { contributionsCollection(from: \"${FROM}\", to: \"${TO}\") { contributionCalendar { totalContributions } } } }" \
              --jq '.data.user.contributionsCollection.contributionCalendar.totalContributions')
            TOTAL_CONTRIBUTIONS=$((TOTAL_CONTRIBUTIONS + COUNT))
          done

          # --- Language ranking ---
          LANG_TREE=$(GH_TOKEN="$GH_TOKEN_PAT" gh api graphql --paginate -f query='
            query($endCursor: String) {
              user(login: "ktmage") {
                repositories(first: 100, after: $endCursor, ownerAffiliations: OWNER, isFork: false) {
                  pageInfo { hasNextPage endCursor }
                  nodes {
                    languages(first: 10, orderBy: {field: SIZE, direction: DESC}) {
                      edges { size node { name } }
                    }
                  }
                }
              }
            }
          ' --jq '
            [.data.user.repositories.nodes[].languages.edges[] | {name: .node.name, size: .size}]
          ' | jq -rs '
            flatten |
            group_by(.name) |
            map({name: .[0].name, size: ([.[].size] | add)}) |
            sort_by(-.size) |
            .[:5] |
            to_entries |
            length as $len |
            map(
              (if .key == ($len - 1) then "в””в”Җ " else "в”ңв”Җ " end) +
              .value.name
            ) | .[]
          ')

          # --- Build left column ---
          LEFT=$(printf '%s\n' \
            "вҳ… ${STARS_TOTAL} stars" \
            "$STARS_LINES" \
            "" \
            "в—Ҹ ${TOTAL_CONTRIBUTIONS} contributions")

          # --- Build right column ---
          RIGHT=$(printf '%s\n' \
            "в—Ҷ Languages" \
            "$LANG_TREE")

          # --- Merge columns side by side ---
          COL_WIDTH=28

          mapfile -t L_LINES <<< "$LEFT"
          mapfile -t R_LINES <<< "$RIGHT"
          L_COUNT=${#L_LINES[@]}
          R_COUNT=${#R_LINES[@]}
          MAX=$((L_COUNT > R_COUNT ? L_COUNT : R_COUNT))

          COLUMNS=""
          for ((i=0; i<MAX; i++)); do
            l="${L_LINES[$i]:-}"
            r="${R_LINES[$i]:-}"
            # wc -m counts characters, not bytes
            char_len=$(echo -n "$l" | wc -m | tr -d ' ')
            spaces=$((COL_WIDTH - char_len))
            if [ "$spaces" -lt 1 ]; then spaces=1; fi
            pad=$(printf "%*s" "$spaces" "")
            COLUMNS+="${l}${pad}${r}"$'\n'
          done
          COLUMNS=$(echo "$COLUMNS" | sed 's/[[:space:]]*$//')

          # --- Build README from template ---
          cp README.md.tpl README.md

          echo "$COLUMNS" > /tmp/columns.txt
          COLUMNS_CONTENT=$(cat /tmp/columns.txt)
          awk -v val="$COLUMNS_CONTENT" '{gsub(/\{\{COLUMNS\}\}/, val); print}' README.md > /tmp/readme_tmp && mv /tmp/readme_tmp README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add README.md && git commit -m "update stats" && git push)
