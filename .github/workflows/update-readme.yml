name: Update README Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats and update README
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Total stars
          STARS_TOTAL=$(gh api users/ktmage/repos --paginate --jq '[.[].stargazers_count] | add // 0')

          # Stars tree (repos with stars > 0, sorted desc)
          STARS_LINES=$(gh api users/ktmage/repos --paginate --jq '
            [.[] | select(.stargazers_count > 0)] | sort_by(-.stargazers_count) |
            to_entries | map(
              (if .key == (length - 1) then "└─ " else "├─ " end) +
              .value.name + "  " + (.value.stargazers_count | tostring)
            ) | .[]
          ')

          # Total contributions
          CONTRIBUTIONS_TOTAL=$(gh api graphql -f query='
            query {
              user(login: "ktmage") {
                contributionsCollection {
                  contributionCalendar { totalContributions }
                }
              }
            }
          ' --jq '.data.user.contributionsCollection.contributionCalendar.totalContributions')

          # Contributions by language tree
          CONTRIB_LINES=$(gh api graphql -f query='
            query {
              user(login: "ktmage") {
                contributionsCollection {
                  commitContributionsByRepository(maxRepositories: 100) {
                    repository { primaryLanguage { name } }
                    contributions { totalCount }
                  }
                }
              }
            }
          ' --jq '
            .data.user.contributionsCollection.commitContributionsByRepository |
            group_by(.repository.primaryLanguage.name) |
            map({lang: (.[0].repository.primaryLanguage.name // "Other"), count: ([.[].contributions.totalCount] | add)}) |
            sort_by(-.count) |
            to_entries | map(
              (if .key == (length - 1) then "└─ " else "├─ " end) +
              .value.lang + "  " + (.value.count | tostring)
            ) | .[]
          ')

          # Views (14 days) - requires PAT with repo scope
          if VIEWS_RAW=$(gh api repos/ktmage/ktmage/traffic/views --jq '.count' 2>/dev/null); then
            VIEWS="$VIEWS_RAW"
          else
            VIEWS="-"
          fi

          # Limit trees to top 5
          STARS_LINES=$(echo "$STARS_LINES" | head -5)
          CONTRIB_LINES=$(echo "$CONTRIB_LINES" | head -5)

          # Fix last line marker
          STARS_LINES=$(echo "$STARS_LINES" | sed '$ s/├─/└─/')
          CONTRIB_LINES=$(echo "$CONTRIB_LINES" | sed '$ s/├─/└─/')

          # Build README from template
          cp README.md.tpl README.md
          sed -i "s|{{STARS_TOTAL}}|${STARS_TOTAL}|g" README.md
          sed -i "s|{{CONTRIBUTIONS_TOTAL}}|${CONTRIBUTIONS_TOTAL}|g" README.md

          # Replace tree placeholders (multi-line, use temp files)
          echo "$STARS_LINES" > /tmp/stars_tree.txt
          echo "$CONTRIB_LINES" > /tmp/contrib_tree.txt

          STARS_TREE=$(cat /tmp/stars_tree.txt)
          CONTRIB_TREE=$(cat /tmp/contrib_tree.txt)

          awk -v stars="$STARS_TREE" '{gsub(/\{\{STARS_TREE\}\}/, stars); print}' README.md > /tmp/readme_tmp && mv /tmp/readme_tmp README.md
          awk -v contrib="$CONTRIB_TREE" '{gsub(/\{\{CONTRIBUTIONS_TREE\}\}/, contrib); print}' README.md > /tmp/readme_tmp && mv /tmp/readme_tmp README.md
          sed -i "s|{{VIEWS}}|${VIEWS}|g" README.md

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add README.md && git commit -m "update stats" && git push)
